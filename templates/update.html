{% extends 'base.html' %}

{% block head %}
<title>Update Pokemon</title>
{% endblock %}

{% block body %}
<div class="content">
    <header class="pokedex-header">
        <span class="pokeball"></span>
        <h1>Update Pokemon</h1>
    </header>

    <div class="control-panel">
        <form action="/update/{{ pokemon.id }}" method="POST" class="search-form">
            <input type="text" name="name" id="name" value="{{ pokemon.name }}" autocomplete="off">
            <button type="submit">Save</button>
        </form>
        <div class="team-actions">
            <a href="/" class="btn-secondary">← Back to team</a>
        </div>
    </div>
</div>
{% endblock %}
